services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pokemine_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - pokemine

  db:
    image: mariadb:11
    container_name: pokemine_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: toor
      MYSQL_DATABASE: pokemine
      MYSQL_USER: pokemine
      MYSQL_PASSWORD: pokemine
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - pokemine

networks:
  pokemine:

volumes:
  dbdata: